<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
  <title>Yummy Tummy AI</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Sanitizer + Markdown -->
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- Syntax highlight -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11.10.0/styles/github-dark.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11.10.0/highlight.min.js"></script>

  <style>
    @media (prefers-reduced-motion: reduce) { *{animation:none!important;transition:none!important;} }
    .msg:hover .msg-actions { opacity: 1; }
    @media (hover: none) { .msg-actions { opacity: 1; } }
    @supports(padding: max(0px)) { .composer-safe { padding-bottom: max(1rem, env(safe-area-inset-bottom)); } }

    /* Mobile typography bump (desktop unchanged) */
    .prose :where(p,li){ font-size:15px; line-height:1.6; }
    @media (min-width:640px){ .prose :where(p,li){ font-size:1rem; line-height:1.75; } }

    /* Chat scrolling behavior on phones */
    @media (max-width: 767px){
      #chatbox{
        scroll-padding-bottom: 96px;   /* overwritten by JS to composer height */
        overscroll-behavior-y: contain;
        -webkit-overflow-scrolling: touch;
      }
    }

    /* Prevent browser’s scroll anchoring from fighting our “stick to bottom” */
    #chatbox { overflow-anchor: none; }

    /* iOS momentum scroll smoothing */
    .touch-scrolling { -webkit-overflow-scrolling: touch; }
  </style>
</head>

<body class="min-h-[100svh] bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950 text-slate-100 antialiased">
  <div class="mx-auto max-w-7xl px-3 sm:px-6 lg:px-8 py-4 sm:py-6">
    <div class="flex gap-4">
      <!-- Sidebar (desktop only; unchanged) -->
      <aside class="hidden md:flex md:w-72 shrink-0">
        <div class="w-full h-full flex flex-col rounded-2xl border border-slate-800/70 bg-slate-900/60 backdrop-blur-xl shadow-xl p-4">
          <div class="flex items-center justify-between">
            <h2 class="text-base font-semibold tracking-tight text-emerald-400">Saved Chats</h2>
            <button onclick="renderSavedChats?.()"
              class="text-xs text-slate-400 hover:text-emerald-300 focus:outline-none focus-visible:ring-2 focus-visible:ring-emerald-400/50 rounded-md px-2 py-1">
              Refresh
            </button>
          </div>
          <ul id="savedChats" class="mt-3 space-y-2 text-sm"></ul>
          <div class="flex-1"></div>
          <a href="/about.html" class="block mt-4 text-sm text-emerald-400 hover:underline">About</a>
        </div>
      </aside>

      <!-- Main column -->
      <main class="flex-1">
        <!-- CARD: grid rows (header / content). Mobile fills screen; desktop unchanged -->
        <div class="rounded-2xl border border-slate-800/70 bg-slate-900/60 backdrop-blur-xl shadow-2xl overflow-hidden
                    grid grid-rows-[auto,1fr] min-h-[calc(100svh-2rem)] md:min-h-0">
          <!-- Header -->
          <header
            class="sticky md:static top-0 z-30 px-4 sm:px-8 py-3 md:pt-6 md:pb-4 border-b border-slate-800/60
                   bg-slate-900/70 md:bg-transparent backdrop-blur supports-[backdrop-filter]:bg-slate-900/50 md:supports-[backdrop-filter]:bg-transparent">
            <div class="flex items-center justify-between gap-2">
              <h1 class="text-2xl sm:text-4xl md:text-4xl font-bold tracking-tight">
                Yummy Tummy <span class="text-emerald-400">AI</span>
              </h1>

              <!-- Mobile hamburger (desktop hidden) -->
              <button id="mobileMenuBtn" aria-controls="mobileSavedModal" aria-expanded="false"
                class="md:hidden inline-flex h-12 w-12 items-center justify-center rounded-xl bg-slate-800/80
                       px-0 text-emerald-400 shadow-md ring-1 ring-inset ring-slate-700 hover:bg-slate-700
                       focus:outline-none focus-visible:ring-2 focus-visible:ring-emerald-300 transition"
                aria-label="Show saved chats">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8h16M4 16h16" />
                </svg>
              </button>
            </div>
          </header>

          <!-- CONTENT ROW (fills remaining height) -->
          <section class="relative flex flex-col min-h-0 md:h-[75vh]">
            <!-- Local-only storage notice -->
            <div id="privacyNotice" class="hidden mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
              <div class="mt-3 rounded-xl border border-emerald-700/30 bg-emerald-900/30 text-emerald-50 backdrop-blur p-3 sm:p-4 flex items-start gap-3">
                <svg class="w-5 h-5 mt-0.5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M12 2a10 10 0 100 20 10 10 0 000-20z" />
                </svg>
                <div class="text-sm leading-6">
                  <strong class="font-semibold">Privacy:</strong>
                  Your chats are saved <span class="font-semibold">locally on this device only</span>.
                  Clearing your browser data (or using a different device/browser) will remove them.
                  <button id="privacyLearnMore" class="ml-1 underline decoration-emerald-300/60 hover:decoration-emerald-200">Learn more</button>
                </div>
                <button id="privacyDismiss"
                  class="ml-auto inline-flex items-center gap-1 rounded-full bg-emerald-600 px-3 py-1.5 text-sm font-medium text-white shadow-sm ring-1 ring-inset ring-emerald-500 hover:bg-emerald-700 focus:outline-none focus-visible:ring-2 focus-visible:ring-emerald-300 transition"
                  aria-label="Dismiss privacy notice">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                  </svg>
                </button>
              </div>
            </div>

            <!-- Messages -->
            <div id="chatbox"
                 class="flex-1 min-h-0 overflow-y-auto px-3 md:px-5 lg:px-8 py-4 md:py-5 space-y-3 md:space-y-4 touch-scrolling"
                 role="log" aria-live="polite" aria-relevant="additions text">
              <!-- sentinel keeps pinning logic robust -->
              <div id="bottomSentinel" class="h-px"></div>
            </div>

            <!-- Jump-to-latest (appears only when user scrolled up) -->
            <button id="jumpLatest"
              class="hidden md:hidden absolute right-4 bottom-24 rounded-full bg-slate-800/95 text-emerald-300
                     ring-1 ring-slate-700 shadow px-3 py-1.5 text-sm">
              Jump to latest ↓
            </button>

            <!-- Typing indicator -->
            <div id="typing" class="hidden px-3 md:px-8">
              <div class="inline-flex items-center gap-2 rounded-xl border border-slate-800 bg-slate-900/40 px-3 py-2 text-slate-300">
                <span>Chef is typing</span>
                <span class="inline-flex gap-1">
                  <span class="w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce [animation-delay:-0.2s]"></span>
                  <span class="w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce [animation-delay:-0.1s]"></span>
                  <span class="w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce"></span>
                </span>
              </div>
            </div>

            <!-- Attachments preview tray -->
            <div id="previewTray" class="px-3 md:px-8 hidden">
              <div class="flex gap-2 flex-wrap py-2"></div>
            </div>

            <!-- SR live region -->
            <div id="srLive" class="sr-only" aria-live="polite"></div>

            <!-- Composer -->
            <div id="composer" class="composer-safe sticky bottom-0 px-3 md:px-8 pb-[calc(0.75rem+env(safe-area-inset-bottom))] md:pb-[calc(1rem+env(safe-area-inset-bottom))] pt-2 md:pt-3
                        bg-slate-900/70 md:bg-slate-900/40 backdrop-blur-xl border-t border-slate-800/60">
              <div class="flex flex-col md:flex-row md:items-end gap-2">
                <label for="input" class="sr-only">Your message</label>
                <textarea id="input" rows="1" enterkeyhint="send" inputmode="text" autocomplete="off" autocapitalize="sentences"
                  class="w-full md:flex-1 rounded-xl md:rounded-2xl border border-slate-700/70 bg-slate-900/70 md:bg-slate-900/60
                         px-3 md:px-4 py-3 text-[15px] md:text-[15px] text-slate-100 placeholder-slate-400
                         shadow-inner outline-none focus:border-emerald-400 focus:ring-2 focus:ring-emerald-400/30
                         transition resize-none leading-6 md:leading-7 min-h-[52px] md:min-h-[48px] max-h-56"
                  placeholder="Ask a recipe question or paste your ingredients..."></textarea>

                <div class="flex items-center justify-end gap-2 shrink-0">
                  <button id="saveBtn" onclick="saveChat?.()"
                    class="h-12 w-12 md:h-11 md:w-11 inline-flex items-center justify-center rounded-full bg-slate-900/70
                           ring-1 ring-inset ring-slate-700/80 text-slate-300 hover:text-slate-100 hover:bg-slate-800/70
                           focus:outline-none focus-visible:ring-2 focus-visible:ring-blue-300 active:scale-[0.98] transition"
                    title="Save chat" aria-label="Save chat">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 3H7a2 2 0 00-2 2v14a2 2 0 002 2h10a2 2 0 002-2V5a2 2 0 00-2-2z" />
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 3v4h10V3" />
                    </svg>
                  </button>

                  <button id="newChatBtn" onclick="newChat?.()"
                    class="h-12 w-12 md:h-11 md:w-11 inline-flex items-center justify-center rounded-full bg-slate-900/70
                           ring-1 ring-inset ring-slate-700/80 text-slate-300 hover:text-slate-100 hover:bg-slate-800/70
                           transition focus:outline-none focus-visible:ring-2 focus-visible:ring-emerald-300 active:scale-[0.98]"
                    title="New Chat" aria-label="New Chat">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                    </svg>
                  </button>

                  <button id="sendBtn" onclick="send?.()"
                    class="inline-flex items-center gap-2 rounded-full bg-emerald-500 px-4 md:px-5 h-12 md:h-11
                           text-white font-semibold shadow-lg ring-1 ring-inset ring-emerald-400/40 hover:bg-emerald-600
                           focus:outline-none focus-visible:ring-2 focus-visible:ring-emerald-300 active:scale-[0.99]
                           transition disabled:opacity-50 disabled:cursor-not-allowed"
                    title="Send" aria-label="Send message" disabled>
                    <span class="hidden md:inline">Send</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12l14-7-7 14-2-5-5-2z" />
                    </svg>
                  </button>
                </div>
              </div>
            </div>
          </section>
        </div>
      </main>
    </div>
  </div>

  <!-- Mobile Saved Chats Modal -->
  <div class="fixed inset-0 z-40 hidden bg-black/70 sm:bg-black/60" id="mobileSavedModalBg"></div>
  <div class="fixed left-0 top-0 z-50 hidden h-[100dvh] w-[92vw] sm:w-[82vw] max-w-xs overflow-y-auto
              rounded-r-2xl border border-slate-800 bg-slate-900/95 sm:bg-slate-900/90 backdrop-blur-md p-5"
       id="mobileSavedModal" role="dialog" aria-modal="true" aria-labelledby="mobileSavedHeading">
    <div class="mb-3 flex items-center justify-between">
      <h2 id="mobileSavedHeading" class="text-base font-semibold tracking-tight text-emerald-400">Saved Chats</h2>
      <button class="rounded-full w-10 h-10 flex items-center justify-center text-slate-300 hover:bg-slate-800
                     focus:outline-none focus-visible:ring-2 focus-visible:ring-emerald-400/50"
              aria-label="Close" id="mobileCloseBtn">✕</button>
    </div>
    <ul id="mobileSavedChats" class="space-y-2 text-sm"></ul>
    <hr class="my-4 border-slate-800">
    <a href="/public/about.html" class="block text-sm text-emerald-400 hover:underline">About</a>
  </div>

  <!-- Your client app (unchanged) -->
  <script type="module" src="/app.js"></script>

  <!-- Mobile-first chat UX -->
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      const chatbox   = document.getElementById('chatbox');
      const input     = document.getElementById('input');
      const sendBtn   = document.getElementById('sendBtn');
      const jumpBtn   = document.getElementById('jumpLatest');
      const composer  = document.getElementById('composer');
      const sentinel  = document.getElementById('bottomSentinel');

      // --- Enable/disable Send on content
      const hasText = () => (input.value || '').trim().length > 0;
      const updateSendEnabled = () => { sendBtn.disabled = !hasText(); };
      input.addEventListener('input', updateSendEnabled);
      updateSendEnabled();

      // --- Autosize textarea (like iMessage/WhatsApp)
      const autoSize = () => {
        const prevH = input.offsetHeight;
        input.style.height = 'auto';
        const maxPx = parseInt(getComputedStyle(input).maxHeight || 224, 10);
        input.style.height = Math.min(input.scrollHeight, maxPx) + 'px';
        if (input.offsetHeight !== prevH) {
          // Keep the latest messages visible if we were pinned
          if (stickToLatest) nudgeLatest(2, 60);
          setScrollPadding(); // composer changed height
        }
      };
      input.addEventListener('input', autoSize);
      // Run once to set initial height and padding
      requestAnimationFrame(() => { autoSize(); setScrollPadding(); });

      // --- Compute scroll padding to keep last messages unobscured by composer
      function setScrollPadding() {
        const pad = (composer?.offsetHeight || 80) + 16; // extra breathing room
        chatbox.style.scrollPaddingBottom = pad + 'px';
      }

      // Recompute on viewport or composer size changes
      if ('ResizeObserver' in window) {
        const ro = new ResizeObserver(() => setScrollPadding());
        ro.observe(composer);
      }
      if (window.visualViewport) {
        const rebottom = () => { setScrollPadding(); if (stickToLatest) nudgeLatest(2, 60); };
        visualViewport.addEventListener('resize', rebottom);
        visualViewport.addEventListener('scroll', rebottom);
      }

      // --- Stick-to-bottom logic
      const THRESHOLD = 64;
      let stickToLatest = true; // start pinned

      const atBottom = () =>
        (chatbox.scrollHeight - chatbox.scrollTop - chatbox.clientHeight) <= THRESHOLD;

      function showJump(show) { jumpBtn.classList.toggle('hidden', !show); }

      function scrollToLatest() {
        const prev = chatbox.style.scrollBehavior;
        chatbox.style.scrollBehavior = 'auto';
        chatbox.scrollTop = chatbox.scrollHeight;
        chatbox.style.scrollBehavior = prev || '';
      }

      function nudgeLatest(frames = 3, spreadMs = 120) {
        let i = 0;
        const tick = () => {
          scrollToLatest();
          if (++i < frames) requestAnimationFrame(tick);
          else setTimeout(scrollToLatest, spreadMs);
        };
        requestAnimationFrame(tick);
      }

      // IntersectionObserver sentinel to robustly detect bottom visibility
      if ('IntersectionObserver' in window && sentinel) {
        const io = new IntersectionObserver((entries) => {
          const vis = entries[0].isIntersecting;
          stickToLatest = vis;
          showJump(!vis);
        }, { root: chatbox, threshold: 1.0 });
        io.observe(sentinel);
      }

      // Scroll watcher (fallback + jump visibility)
      let scrollRAF = null;
      chatbox.addEventListener('scroll', () => {
        if (scrollRAF) cancelAnimationFrame(scrollRAF);
        scrollRAF = requestAnimationFrame(() => {
          const bottom = atBottom();
          stickToLatest = bottom;
          showJump(!bottom);
        });
      }, { passive: true });

      // Jump button
      jumpBtn.addEventListener('click', () => {
        stickToLatest = true;
        nudgeLatest(4, 120);
        showJump(false);
      });

      // New children added -> stay pinned like real chats
      const mo = new MutationObserver((muts) => {
        const added = muts.some(m => m.addedNodes && m.addedNodes.length);
        if (!added) return;
        if (stickToLatest) nudgeLatest(2, 80);
        else showJump(true);
      });
      mo.observe(chatbox, { childList: true, subtree: false });

      // Images/markdown late layout
      document.addEventListener('load', (e) => {
        if (e.target && e.target.tagName === 'IMG' && e.target.closest('#chatbox')) {
          if (stickToLatest) nudgeLatest(2, 80);
        }
      }, true);

      // --- Keyboard behavior: send closes keyboard, keeps pinned, Enter=send (Shift+Enter = newline)
      const blurKeyboard = () => { try { input.blur(); } catch {} };
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          if (!hasText()) return;
          stickToLatest = true;
          blurKeyboard();
          nudgeLatest(4, 120);
          // Prefer global send() if provided
          if (typeof window.send === 'function') {
            Promise.resolve(window.send()).finally(() => {
              setTimeout(blurKeyboard, 10);
              setTimeout(blurKeyboard, 150);
              nudgeLatest(6, 220);
              updateSendEnabled();
              autoSize();
            });
          }
        }
      });

      // Tap chat area to dismiss keyboard (common in messengers)
      chatbox.addEventListener('pointerdown', () => {
        if (document.activeElement === input) blurKeyboard();
      });

      // If a send button click occurs (e.g., from tap), mirror the behavior
      if (typeof window.send === 'function') {
        const originalSend = window.send;
        window.send = async function patchedSend() {
          if (!hasText()) return;
          stickToLatest = true;
          blurKeyboard();
          nudgeLatest(4, 120);
          try {
            await originalSend();
          } finally {
            setTimeout(blurKeyboard, 10);
            setTimeout(blurKeyboard, 150);
            nudgeLatest(6, 220);
            updateSendEnabled();
            autoSize();
          }
        };
      }

      // --- Mobile Saved Chats Drawer wiring
      const mobileBtn   = document.getElementById('mobileMenuBtn');
      const mobileBg    = document.getElementById('mobileSavedModalBg');
      const mobileModal = document.getElementById('mobileSavedModal');
      const mobileClose = document.getElementById('mobileCloseBtn');

      const openDrawer = () => {
        mobileBg.classList.remove('hidden');
        mobileModal.classList.remove('hidden');
        document.body.classList.add('overflow-hidden');
        mobileBtn?.setAttribute('aria-expanded', 'true');
        // populate list if available
        if (typeof renderSavedChats === 'function') {
          renderSavedChats();
          // also mirror into mobile if your app populates #savedChats only:
          const src = document.getElementById('savedChats');
          const dst = document.getElementById('mobileSavedChats');
          if (src && dst) dst.innerHTML = src.innerHTML;
        }
      };
      const closeDrawer = () => {
        mobileBg.classList.add('hidden');
        mobileModal.classList.add('hidden');
        document.body.classList.remove('overflow-hidden');
        mobileBtn?.setAttribute('aria-expanded', 'false');
      };

      mobileBtn?.addEventListener('click', openDrawer);
      mobileClose?.addEventListener('click', closeDrawer);
      mobileBg?.addEventListener('click', closeDrawer);
      window.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeDrawer(); });

      // --- Optional: privacy notice demo handlers
      document.getElementById('privacyDismiss')?.addEventListener('click', () => {
        document.getElementById('privacyNotice')?.classList.add('hidden');
      });
      document.getElementById('privacyLearnMore')?.addEventListener('click', () => {
        alert('Your chats are stored in localStorage on this device only.');
      });

      // First mount: pin to bottom
      nudgeLatest(2, 80);
    });
  </script>
</body>
</html>
