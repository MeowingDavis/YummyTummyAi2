<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="robots" content="noindex" />
  <title>Server error - Yummy Tummy AI</title>
  <script src="/newsprint-tailwind.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/newsprint.css" />
  
</head>
<body class="min-h-[100svh] bg-newsprint-paper text-newsprint-ink antialiased newsprint-texture">
  <main class="min-h-[100svh] np-wrap flex items-center justify-center">
    <div class="stack-surface np-surface np-card-pad-lg max-w-xl w-full">
      <div class="np-label">Error 500</div>
      <h1 class="mt-2 text-3xl sm:text-4xl font-bold tracking-tight">Something went wrong</h1>
      <p class="mt-3 text-slate-300">
        The server hit an error. Please try again in a moment, or head back to the home page.
      </p>
      <div class="mt-6 flex flex-col sm:flex-row gap-3">
        <a href="/" class="np-btn np-btn-primary hard-shadow-hover">
          Go home
        </a>
        <a href="/chat.html" class="np-btn np-btn-secondary hard-shadow-hover">
          Open chat
        </a>
      </div>
    </div>
  </main>
</body>
</html>
