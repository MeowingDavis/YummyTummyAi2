<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
  <title>Auth - Yummy Tummy AI</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <script src="/industrial-tailwind.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/industrial.css" />
</head>
<body class="min-h-[100svh] bg-industrial-chassis text-industrial-text antialiased industrial-texture">
  <header class="skeuo-wrap skeuo-header">
    <div class="skeuo-container-wide flex items-center justify-between gap-4">
      <a href="/" class="inline-flex items-center gap-3">
        <span class="inline-flex h-9 w-9 items-center justify-center rounded-xl bg-emerald-500/10 ring-1 ring-emerald-400/20">🍳</span>
        <span class="text-xl font-semibold tracking-tight">Yummy Tummy <span class="text-emerald-400">AI</span></span>
      </a>
      <nav class="flex items-center gap-4">
        <a href="/" class="skeuo-link">Home</a>
        <a href="/chat.html" class="skeuo-link">Open Chat</a>
      </nav>
    </div>
  </header>

  <main class="skeuo-wrap skeuo-section-tight pb-12">
    <div class="skeuo-container-narrow max-w-md">
      <div class="stack-surface skeuo-surface skeuo-card-pad-lg">
        <div class="flex gap-2 mb-4">
          <button id="tabLogin" type="button" class="skeuo-btn skeuo-btn-secondary skeuo-interactive flex-1">Login</button>
          <button id="tabRegister" type="button" class="skeuo-btn skeuo-btn-secondary skeuo-interactive flex-1">Register</button>
        </div>

        <form id="authForm" class="space-y-3">
          <div>
            <label class="skeuo-label" for="email">Email</label>
            <input id="email" type="email" required class="skeuo-input w-full px-3 py-2 mt-1" autocomplete="email" />
          </div>

          <div>
            <label class="skeuo-label" for="name">Name (optional)</label>
            <input id="name" type="text" class="skeuo-input w-full px-3 py-2 mt-1" autocomplete="name" />
          </div>

          <div>
            <label class="skeuo-label" for="password">Password</label>
            <div class="mt-1 flex items-center gap-2">
              <input id="password" type="password" required class="skeuo-input w-full px-3 py-2" autocomplete="current-password" />
              <button id="togglePassword" type="button" class="skeuo-btn skeuo-btn-secondary skeuo-interactive px-3 py-2 text-[10px]">Show</button>
            </div>
            <div id="passwordGuidance" class="mt-2 text-xs text-slate-300 hidden">
              <div class="mb-1">Password strength: <span id="passwordStrength" class="font-semibold text-slate-200">Weak</span></div>
              <ul class="space-y-1">
                <li id="pwLen">• At least 8 characters</li>
                <li id="pwLower">• Lowercase letter</li>
                <li id="pwUpper">• Uppercase letter</li>
                <li id="pwDigit">• Number</li>
                <li id="pwSymbol">• Special character</li>
              </ul>
            </div>
          </div>

          <div id="confirmWrap">
            <label class="skeuo-label" for="confirmPassword">Confirm password</label>
            <div class="mt-1 flex items-center gap-2">
              <input id="confirmPassword" type="password" class="skeuo-input w-full px-3 py-2" autocomplete="new-password" />
              <button id="toggleConfirmPassword" type="button" class="skeuo-btn skeuo-btn-secondary skeuo-interactive px-3 py-2 text-[10px]">Show</button>
            </div>
          </div>

          <p id="authError" class="text-red-300 text-sm hidden"></p>

          <button id="submitBtn" type="submit" class="skeuo-btn skeuo-btn-primary skeuo-interactive w-full">Create account</button>
        </form>
      </div>
    </div>
  </main>

  <script src="/js/auth-page.js"></script>
</body>
</html>
