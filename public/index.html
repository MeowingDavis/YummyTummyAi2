<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
  <title>Yummy Tummy AI</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Sanitizer + Markdown -->
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- Syntax highlight -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/javascript.min.js"></script>

  <style>
    @media (prefers-reduced-motion: reduce) { *{animation:none!important;transition:none!important;} }
    .msg:hover .msg-actions { opacity: 1; }
    @media (hover: none) { .msg-actions { opacity: 1; } }
    @supports(padding: max(0px)) { .composer-safe { padding-bottom: max(1rem, env(safe-area-inset-bottom)); } }

    /* Mobile typography bump (desktop unchanged) */
    .prose :where(p,li){ font-size:15px; line-height:1.6; }
    @media (min-width:640px){ .prose :where(p,li){ font-size:1rem; line-height:1.75; } }

    /* Chat scrolling behavior on phones */
    @media (max-width: 767px){
      #chatbox{
        scroll-padding-bottom: 96px;   /* overwritten by JS to composer height */
        overscroll-behavior-y: contain;
        -webkit-overflow-scrolling: touch;
      }
    }

    /* Prevent browser's scroll anchoring from fighting our "stick to bottom" */
    #chatbox { overflow-anchor: none; }

    /* iOS momentum scroll smoothing */
    .touch-scrolling { -webkit-overflow-scrolling: touch; }

    /* Mobile-specific improvements */
    @media (max-width: 767px) {
      /* Improved mobile header with better spacing */
      .mobile-header {
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }
      
      /* Better mobile button sizing and touch targets */
      .mobile-button {
        min-height: 48px;
        min-width: 48px;
      }
      
      /* Enhanced mobile composer with better visual hierarchy */
      .mobile-composer {
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        box-shadow: 0 -8px 32px -4px rgba(0, 0, 0, 0.4);
      }
      
      /* Improved mobile input styling */
      .mobile-input {
        font-size: 16px; /* Prevents iOS zoom */
        box-shadow: 0 4px 12px -2px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(52, 211, 153, 0.1);
      }
      
      /* Better mobile drawer animation */
      .mobile-drawer {
        transform: translateX(-100%);
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      
      .mobile-drawer.open {
        transform: translateX(0);
      }
      
      /* Enhanced mobile privacy notice */
      .mobile-privacy {
        margin: 8px;
        border-radius: 12px;
      }
    }

    /* Enhanced mobile animations */
    @media (max-width: 767px) {
      .mobile-scale-press:active {
        transform: scale(0.96);
        transition: transform 0.1s ease-out;
      }
      
      .mobile-bounce-in {
        animation: mobile-bounce 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      }
      
      @keyframes mobile-bounce {
        0% { opacity: 0; transform: scale(0.8) translateY(20px); }
        100% { opacity: 1; transform: scale(1) translateY(0); }
      }
    }

    /* Highlight.js dark theme inline styles */
    .hljs {
      display: block;
      overflow-x: auto;
      padding: 0.5em;
      background: #0d1117;
      color: #e6edf3;
    }
    .hljs-comment,
    .hljs-quote {
      color: #7d8590;
      font-style: italic;
    }
    .hljs-keyword,
    .hljs-selector-tag,
    .hljs-subst {
      color: #ff7b72;
    }
    .hljs-number,
    .hljs-literal,
    .hljs-variable,
    .hljs-template-variable {
      color: #79c0ff;
    }
    .hljs-string,
    .hljs-doctag {
      color: #a5d6ff;
    }
    .hljs-title,
    .hljs-section,
    .hljs-selector-id {
      color: #d2a8ff;
      font-weight: bold;
    }
    .hljs-type,
    .hljs-class .hljs-title {
      color: #ffa657;
    }
    .hljs-tag,
    .hljs-name,
    .hljs-attribute {
      color: #7ee787;
    }
    .hljs-regexp,
    .hljs-link {
      color: #a5d6ff;
    }
    .hljs-symbol,
    .hljs-bullet {
      color: #f85149;
    }
    .hljs-built_in,
    .hljs-builtin-name {
      color: #ffa657;
    }
    .hljs-meta {
      color: #79c0ff;
    }
    .hljs-deletion {
      background: #ffeef0;
    }
    .hljs-addition {
      background: #e6ffed;
    }
  </style>
</head>

<body class="min-h-[100svh] bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950 text-slate-100 antialiased">

  <!-- Mobile-first chat UX -->
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      const chatbox   = document.getElementById('chatbox');
      const input     = document.getElementById('input');
      const sendBtn   = document.getElementById('sendBtn');
      const jumpBtn   = document.getElementById('jumpLatest');
      const composer  = document.getElementById('composer');
      const sentinel  = document.getElementById('bottomSentinel');

      // --- Enable/disable Send on content
      const hasText = () => (input.value || '').trim().length > 0;
      const updateSendEnabled = () => { 
        sendBtn.disabled = !hasText();
        // Add visual feedback for mobile
        if (window.innerWidth <= 767) {
          if (hasText()) {
            sendBtn.classList.remove('opacity-50');
            sendBtn.classList.add('shadow-lg');
          } else {
            sendBtn.classList.add('opacity-50');
            sendBtn.classList.remove('shadow-lg');
          }
        }
      };
      input.addEventListener('input', updateSendEnabled);
      updateSendEnabled();

      // --- Autosize textarea (like iMessage/WhatsApp)
      const autoSize = () => {
        const prevH = input.offsetHeight;
        input.style.height = 'auto';
        const maxPx = parseInt(getComputedStyle(input).maxHeight || 224, 10);
        input.style.height = Math.min(input.scrollHeight, maxPx) + 'px';
        if (input.offsetHeight !== prevH) {
          // Keep the latest messages visible if we were pinned
          if (stickToLatest) nudgeLatest(2, 60);
          setScrollPadding(); // composer changed height
        }
      };
      input.addEventListener('input', autoSize);
      // Run once to set initial height and padding
      requestAnimationFrame(() => { autoSize(); setScrollPadding(); });

      // --- Compute scroll padding to keep last messages unobscured by composer
      function setScrollPadding() {
        const pad = (composer?.offsetHeight || 80) + 16; // extra breathing room
        chatbox.style.scrollPaddingBottom = pad + 'px';
      }

      // Recompute on viewport or composer size changes
      if ('ResizeObserver' in window) {
        const ro = new ResizeObserver(() => setScrollPadding());
        ro.observe(composer);
      }
      if (window.visualViewport) {
        const rebottom = () => { setScrollPadding(); if (stickToLatest) nudgeLatest(2, 60); };
        visualViewport.addEventListener('resize', rebottom);
        visualViewport.addEventListener('scroll', rebottom);
      }

      // --- Stick-to-bottom logic
      const THRESHOLD = 64;
      let stickToLatest = true; // start pinned

      const atBottom = () =>
        (chatbox.scrollHeight - chatbox.scrollTop - chatbox.clientHeight) <= THRESHOLD;

      function showJump(show) { 
        jumpBtn.classList.toggle('hidden', !show);
        if (show && window.innerWidth <= 767) {
          jumpBtn.classList.add('mobile-bounce-in');
          setTimeout(() => jumpBtn.classList.remove('mobile-bounce-in'), 400);
        }
      }

      function scrollToLatest() {
        const prev = chatbox.style.scrollBehavior;
        chatbox.style.scrollBehavior = 'auto';
        chatbox.scrollTop = chatbox.scrollHeight;
        chatbox.style.scrollBehavior = prev || '';
      }

      function nudgeLatest(frames = 3, spreadMs = 120) {
        let i = 0;
        const tick = () => {
          scrollToLatest();
          if (++i < frames) requestAnimationFrame(tick);
          else setTimeout(scrollToLatest, spreadMs);
        };
        requestAnimationFrame(tick);
      }

      // IntersectionObserver sentinel to robustly detect bottom visibility
      if ('IntersectionObserver' in window && sentinel) {
        const io = new IntersectionObserver((entries) => {
          const vis = entries[0].isIntersecting;
          stickToLatest = vis;
          showJump(!vis);
        }, { root: chatbox, threshold: 1.0 });
        io.observe(sentinel);
      }

      // Scroll watcher (fallback + jump visibility)
      let scrollRAF = null;
      chatbox.addEventListener('scroll', () => {
        if (scrollRAF) cancelAnimationFrame(scrollRAF);
        scrollRAF = requestAnimationFrame(() => {
          const bottom = atBottom();
          stickToLatest = bottom;
          showJump(!bottom);
        });
      }, { passive: true });

      // Jump button with haptic feedback on mobile
      jumpBtn.addEventListener('click', () => {
        stickToLatest = true;
        nudgeLatest(4, 120);
        showJump(false);
        // Add haptic feedback if available
        if ('vibrate' in navigator && window.innerWidth <= 767) {
          navigator.vibrate(50);
        }
      });

      // New children added -> stay pinned like real chats
      const mo = new MutationObserver((muts) => {
        const added = muts.some(m => m.addedNodes && m.addedNodes.length);
        if (!added) return;
        if (stickToLatest) nudgeLatest(2, 80);
        else showJump(true);
      });
      mo.observe(chatbox, { childList: true, subtree: false });

      // Images/markdown late layout
      document.addEventListener('load', (e) => {
        if (e.target && e.target.tagName === 'IMG' && e.target.closest('#chatbox')) {
          if (stickToLatest) nudgeLatest(2, 80);
        }
      }, true);

      // --- Enhanced keyboard behavior for mobile
      const blurKeyboard = () => { try { input.blur(); } catch {} };
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          if (!hasText()) return;
          stickToLatest = true;
          blurKeyboard();
          nudgeLatest(4, 120);
          // Add haptic feedback on send
          if ('vibrate' in navigator && window.innerWidth <= 767) {
