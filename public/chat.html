<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
  <title>Yummy Tummy AI Chat</title>
  <meta name="theme-color" content="#173540" />
  <link rel="manifest" href="/manifest.webmanifest" />

  <script src="/industrial-tailwind.js"></script>
    <script src="/vendor/tailwindcss-browser.js"></script>
  <link rel="stylesheet" href="/industrial.css" />

  <script src="/vendor/dompurify.min.js"></script>
  <script src="/vendor/marked.min.js"></script>
  <link rel="stylesheet" href="/vendor/highlight-github-dark.min.css">
  <script src="/vendor/highlight.min.js"></script>
</head>
<body class="min-h-[100svh] overflow-x-hidden bg-industrial-chassis text-industrial-text antialiased industrial-texture">
  <a href="#chat-main" class="skip-link skeuo-btn skeuo-btn-secondary">Skip to chat</a>

  <div class="skeuo-wrap skeuo-container-wide py-2 sm:py-6">
    <div class="flex gap-4 lg:gap-5">
      <aside class="hidden shrink-0 md:flex md:w-72" aria-label="Saved chats panel">
        <section class="stack-surface skeuo-surface flex h-full w-full flex-col skeuo-card-pad">
          <div class="flex items-center justify-between gap-2">
            <h2 class="text-base font-semibold tracking-tight text-emerald-300">Saved Chats</h2>
            <button id="refreshSavedBtn" type="button" class="skeuo-btn skeuo-btn-secondary skeuo-interactive skeuo-btn-sm">Refresh</button>
          </div>
          <ul id="savedChats" class="mt-3 space-y-2 text-sm" aria-label="Saved chats list"></ul>
          <div class="flex-1"></div>
          <div class="mt-4 space-y-4">
            <nav class="flex items-center gap-4 text-sm" aria-label="Secondary">
              <a href="/" class="skeuo-link">Home</a>
              <a href="/about.html" class="skeuo-link">About</a>
              <a href="/recipes.html" class="skeuo-link">Recipes</a>
            </nav>
            <section class="auth-shell auth-shell-flat" data-chat-auth-shell data-auth-ready="false" aria-label="Account menu">
              <div class="auth-shell-head">
                <p class="skeuo-label">Account</p>
                <p class="auth-shell-status" data-chat-auth-status aria-live="polite"></p>
                <p class="auth-shell-email hidden" data-chat-auth-email></p>
              </div>
              <div class="auth-shell-actions">
                <button type="button" data-chat-auth-state="signed-out" data-chat-auth-action="register" class="skeuo-btn skeuo-btn-secondary skeuo-interactive skeuo-btn-sm">Register</button>
                <button type="button" data-chat-auth-state="signed-out" data-chat-auth-action="login" class="skeuo-btn skeuo-btn-secondary skeuo-interactive skeuo-btn-sm">Login</button>
                <button type="button" data-chat-auth-state="signed-in" data-chat-auth-action="account" class="hidden skeuo-btn skeuo-btn-secondary skeuo-interactive skeuo-btn-sm">Account</button>
                <button type="button" data-chat-auth-state="signed-in" data-chat-auth-action="logout" class="hidden skeuo-btn skeuo-btn-danger skeuo-interactive skeuo-btn-sm">Logout</button>
              </div>
            </section>
          </div>
        </section>
      </aside>

      <main id="chat-main" class="flex-1">
        <div class="chat-dock stack-surface skeuo-surface grid h-[calc(100svh-1.5rem)] grid-rows-[auto,1fr] overflow-visible md:h-auto md:min-h-[80svh]">
          <header class="chat-section-shell sticky top-0 z-30 border-b px-2 py-2 md:static md:px-6 md:pb-4 md:pt-5">
            <div class="relative flex items-center justify-between gap-2">
              <h1 class="min-w-0 text-lg font-bold tracking-tight sm:text-3xl">Yummy Tummy <span class="brand-gradient">AI</span></h1>

              <div class="flex items-center gap-2 md:hidden">
                <button id="mobileMenuBtn" aria-controls="mobileSavedModal" aria-expanded="false" class="skeuo-btn skeuo-btn-secondary skeuo-interactive skeuo-btn-icon" aria-label="Show saved chats">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8h16M4 16h16" />
                  </svg>
                </button>
                <button id="mobileOptionsBtn" aria-controls="mobileOptionsPanel" aria-expanded="false" class="skeuo-btn skeuo-btn-secondary skeuo-interactive skeuo-btn-icon" aria-label="Show chat options">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5h.01M12 12h.01M12 19h.01" />
                  </svg>
                </button>
              </div>

              <div id="mobileOptionsPanel" class="hidden md:flex md:w-auto md:flex-row md:items-center md:gap-2" role="menu" aria-label="Chat options">
                <div class="mb-1 hidden items-center justify-between md:hidden" id="mobileOptionsHeader">
                  <h2 class="text-base font-semibold text-emerald-300">Chat options</h2>
                  <button id="mobileOptionsCloseBtn" class="skeuo-btn skeuo-btn-secondary skeuo-btn-icon" type="button" aria-label="Close chat options">✕</button>
                </div>
                <div class="flex flex-col gap-2 md:min-w-[170px]">
                  <label for="modelSelect" class="skeuo-label">Model</label>
                  <select id="modelSelect" class="skeuo-input skeuo-btn-sm w-full px-3 text-sm md:w-auto md:max-w-[170px]" title="Choose model" aria-label="Choose AI model"></select>
                </div>
              </div>
            </div>
          </header>

          <section class="relative flex h-full min-h-0 flex-col md:h-[75vh]" aria-label="Chat interface">
            <div id="privacyNotice" class="hidden px-3 pt-3 md:px-6">
              <div class="stack-surface skeuo-surface stack-compact skeuo-card-pad flex items-start gap-3">
                <svg class="mt-0.5 h-5 w-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M12 2a10 10 0 100 20 10 10 0 000-20z" />
                </svg>
                <div class="chat-copy text-sm leading-6">
                  <strong class="font-semibold">Privacy:</strong>
                  We save chats so you can revisit them. If you are logged in, chats are linked to your account.
                  <button id="privacyLearnMore" class="ml-1 underline decoration-emerald-300/70 hover:decoration-emerald-200">Learn more</button>
                </div>
                <button id="privacyDismiss" class="ml-auto skeuo-btn skeuo-btn-danger skeuo-interactive skeuo-btn-sm" aria-label="Dismiss privacy notice">Got it</button>
              </div>
            </div>

            <div id="chatbox" class="flex-1 min-h-0 space-y-3 overflow-y-auto px-2 py-4 md:px-6 md:py-5" role="log" aria-live="polite" aria-relevant="additions text" aria-label="Conversation"></div>

            <button id="jumpLatest" class="hidden absolute bottom-24 right-4 skeuo-btn skeuo-btn-secondary skeuo-interactive text-sm" type="button">Jump to latest ↓</button>

            <div id="typing" class="hidden px-3 md:px-6" aria-live="polite">
              <div class="chat-status inline-flex items-center gap-2 skeuo-surface px-3 py-2">
                <span>Chef is typing</span>
                <span class="inline-flex gap-1" aria-hidden="true">
                  <span class="chat-status-dot h-1.5 w-1.5 animate-bounce rounded-full [animation-delay:-0.2s]"></span>
                  <span class="chat-status-dot h-1.5 w-1.5 animate-bounce rounded-full [animation-delay:-0.1s]"></span>
                  <span class="chat-status-dot h-1.5 w-1.5 animate-bounce rounded-full"></span>
                </span>
              </div>
            </div>

            <div id="previewTray" class="hidden px-3 md:px-6">
              <div class="flex flex-wrap gap-2 py-2"></div>
            </div>

            <div id="srLive" class="sr-only" aria-live="polite"></div>

            <section class="chat-section-shell stack-surface stack-compact composer-safe sticky bottom-0 border-t px-2 pb-[calc(0.75rem+env(safe-area-inset-bottom))] pt-2 md:px-6 md:pb-[calc(1rem+env(safe-area-inset-bottom))]" aria-label="Message composer">
              <div class="flex flex-col gap-2 md:flex-row md:items-end">
                <label for="input" class="sr-only">Your message</label>
                <textarea id="input" rows="1" enterkeyhint="send" inputmode="text" autocomplete="off" autocapitalize="sentences" class="skeuo-input min-h-[52px] max-h-56 w-full resize-none px-3 py-3 text-base leading-6 outline-none transition focus:border-emerald-400 focus:ring-2 focus:ring-emerald-400/30 md:flex-1" placeholder="Message Yummy Tummy..."></textarea>

                <div class="flex shrink-0 items-center justify-end gap-2">
                  <button id="saveBtn" type="button" class="skeuo-btn skeuo-btn-secondary skeuo-interactive skeuo-btn-icon" title="Save chat" aria-label="Save chat">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 3H7a2 2 0 00-2 2v14a2 2 0 002 2h10a2 2 0 002-2V5a2 2 0 00-2-2z" />
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 3v4h10V3" />
                    </svg>
                  </button>

                  <button id="newChatBtn" class="skeuo-btn skeuo-btn-secondary skeuo-interactive skeuo-btn-icon" title="New chat" aria-label="Start new chat">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                    </svg>
                  </button>

                  <button id="sendBtn" type="button" class="skeuo-btn skeuo-btn-primary skeuo-interactive disabled:cursor-not-allowed disabled:opacity-50" title="Send" aria-label="Send message" disabled>
                    <span class="hidden md:inline">Send</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12l14-7-7 14-2-5-5-2z" />
                    </svg>
                  </button>
                </div>
              </div>
            </section>
          </section>
        </div>
      </main>
    </div>
  </div>

  <div class="fixed inset-0 z-40 hidden bg-black/70 sm:bg-black/60" id="mobileSavedModalBg"></div>
  <aside class="stack-drawer stack-compact skeuo-surface fixed left-0 top-0 z-50 hidden h-[100dvh] w-[92vw] max-w-xs overflow-y-auto p-5 sm:w-[82vw]" id="mobileSavedModal" role="dialog" aria-modal="true" aria-labelledby="mobileSavedHeading">
    <div class="flex min-h-full flex-col">
      <div class="mb-3 flex items-center justify-between">
        <h2 id="mobileSavedHeading" class="text-base font-semibold tracking-tight text-emerald-300">Saved Chats</h2>
        <button class="skeuo-btn skeuo-btn-secondary skeuo-interactive skeuo-btn-icon" aria-label="Close" id="mobileCloseBtn" type="button">✕</button>
      </div>
      <ul id="mobileSavedChats" class="space-y-2 text-sm" aria-label="Saved chats list"></ul>
      <div class="flex-1"></div>
      <div class="mt-4 space-y-4">
        <nav class="flex items-center gap-4" aria-label="Mobile drawer navigation">
          <a href="/" class="skeuo-link">Home</a>
          <a href="/about.html" class="skeuo-link">About</a>
          <a href="/recipes.html" class="skeuo-link">Recipes</a>
        </nav>
        <section class="auth-shell auth-shell-flat" data-chat-auth-shell data-auth-ready="false" aria-label="Account menu">
          <div class="auth-shell-head">
            <p class="skeuo-label">Account</p>
            <p class="auth-shell-status" data-chat-auth-status aria-live="polite"></p>
            <p class="auth-shell-email hidden" data-chat-auth-email></p>
          </div>
          <div class="auth-shell-actions">
            <button type="button" data-chat-auth-state="signed-out" data-chat-auth-action="register" class="skeuo-btn skeuo-btn-secondary skeuo-interactive skeuo-btn-sm">Register</button>
            <button type="button" data-chat-auth-state="signed-out" data-chat-auth-action="login" class="skeuo-btn skeuo-btn-secondary skeuo-interactive skeuo-btn-sm">Login</button>
            <button type="button" data-chat-auth-state="signed-in" data-chat-auth-action="account" class="hidden skeuo-btn skeuo-btn-secondary skeuo-interactive skeuo-btn-sm">Account</button>
            <button type="button" data-chat-auth-state="signed-in" data-chat-auth-action="logout" class="hidden skeuo-btn skeuo-btn-danger skeuo-interactive skeuo-btn-sm">Logout</button>
          </div>
        </section>
      </div>
    </div>
  </aside>

  <div class="fixed inset-0 z-20 hidden bg-black/65 md:hidden" id="mobileOptionsBg"></div>

  <script type="module" src="/js/chat/index.js"></script>
  <script src="/stickToBottom.js"></script>
</body>
</html>
