<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
  <title>Reset Password - Yummy Tummy AI</title>
  <meta name="theme-color" content="#173540" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <script src="/industrial-tailwind.js"></script>
  <script src="/vendor/tailwindcss-browser.js"></script>
  <link rel="stylesheet" href="/industrial.css" />
</head>
<body class="min-h-[100svh] overflow-x-hidden bg-industrial-chassis text-industrial-text antialiased industrial-texture">
  <a href="#main-content" class="skip-link skeuo-btn skeuo-btn-secondary">Skip to content</a>

  <header class="skeuo-wrap skeuo-header sticky top-0 z-40 border-b border-slate-800/60 bg-slate-950/85 backdrop-blur-md">
    <div class="skeuo-container-wide flex min-h-14 items-center justify-between gap-3">
      <a href="/" class="inline-flex items-center gap-3" aria-label="Yummy Tummy AI home">
        <span class="holo-icon-chip" aria-hidden="true">🍳</span>
        <span class="text-lg font-semibold tracking-tight sm:text-xl">Yummy Tummy <span class="brand-gradient">AI</span></span>
      </a>
      <nav class="hidden items-center gap-4 md:flex" aria-label="Primary">
        <a href="/" class="skeuo-link">Home</a>
        <a data-auth-link="login" href="/auth.html?mode=login" class="skeuo-link">Back to login</a>
      </nav>
      <div class="relative md:hidden">
        <button
          type="button"
          data-mobile-nav-btn
          aria-label="Open navigation menu"
          aria-controls="mobileNavPanel"
          aria-expanded="false"
          class="skeuo-btn skeuo-btn-secondary skeuo-btn-sm"
        >
          <svg
            viewBox="0 0 24 24"
            class="h-5 w-5"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          >
            <path d="M4 7h16M4 12h16M4 17h16"></path>
          </svg>
        </button>
        <nav
          id="mobileNavPanel"
          data-mobile-nav-panel
          class="hidden absolute right-0 top-[calc(100%+0.5rem)] z-50 w-64 rounded-2xl border border-slate-700/80 bg-slate-950/95 p-3 shadow-[0_20px_40px_rgba(15,23,42,0.45)] backdrop-blur-md"
          aria-label="Mobile navigation"
        >
          <div class="grid gap-2">
            <a href="/" class="skeuo-btn skeuo-btn-secondary skeuo-btn-sm skeuo-btn-block">Home</a>
            <a href="/about.html" class="skeuo-btn skeuo-btn-secondary skeuo-btn-sm skeuo-btn-block">About</a>
            <a href="/chat.html" class="skeuo-btn skeuo-btn-secondary skeuo-btn-sm skeuo-btn-block">YummyBot</a>
          </div>
          <div class="mt-3 border-t border-slate-700/80 pt-3">
            <div class="grid gap-2">
              <a data-auth="signed-out-only" data-auth-link="login" href="/auth.html?mode=login" class="hidden skeuo-btn skeuo-btn-primary skeuo-btn-sm skeuo-btn-block">Login</a>
              <a data-auth="signed-in-only" href="/account.html" class="hidden skeuo-btn skeuo-btn-secondary skeuo-btn-sm skeuo-btn-block">Account</a>
              <button data-auth="signed-in-only" data-auth-action="logout" type="button" class="hidden skeuo-btn skeuo-btn-danger skeuo-btn-sm skeuo-btn-block">Logout</button>
            </div>
          </div>
        </nav>
      </div>
    </div>
  </header>

  <main id="main-content" class="skeuo-wrap skeuo-section-tight pb-12">
    <section class="skeuo-container-narrow max-w-md" aria-labelledby="reset-title">
      <article class="stack-surface skeuo-surface skeuo-card-pad-lg space-y-4">
        <h1 id="reset-title" class="text-xl font-semibold tracking-tight">Choose a new password</h1>
        <p class="text-sm text-slate-200">Use the link from your email, then set your new password here.</p>

        <form id="resetForm" class="space-y-4" novalidate>
          <div>
            <label class="skeuo-label" for="newPassword">New password</label>
            <input id="newPassword" type="password" required class="skeuo-input mt-1 w-full px-3 py-3" autocomplete="new-password" />
          </div>

          <div>
            <label class="skeuo-label" for="confirmPassword">Confirm password</label>
            <input id="confirmPassword" type="password" required class="skeuo-input mt-1 w-full px-3 py-3" autocomplete="new-password" />
          </div>

          <p id="resetError" class="hidden rounded-xl border border-[rgba(248,113,113,0.55)] bg-[rgba(248,113,113,0.12)] p-3 text-sm font-medium text-[#1a3d37]" role="alert"></p>
          <p id="resetSuccess" class="hidden rounded-xl border border-[rgba(79,209,165,0.55)] bg-[rgba(79,209,165,0.14)] p-3 text-sm font-medium text-[#1a3d37]" role="status" aria-live="polite"></p>
          <a id="backToLoginLink" href="/auth.html?mode=login" class="hidden skeuo-link text-sm">Back to login</a>

          <button id="submitBtn" type="submit" class="skeuo-btn skeuo-btn-primary skeuo-interactive w-full">Update password</button>
        </form>
      </article>
    </section>
  </main>

  <script src="/js/mobile-nav.js" defer></script>
  <script src="/js/site-auth.js" defer></script>
  <script src="/vendor/supabase.min.js" defer></script>
  <script src="/js/reset-password-page.js" defer></script>
  <script src="/js/cookie-consent.js" defer></script>
</body>
</html>
