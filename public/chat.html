<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
  <title>Yummy Tummy AI</title>
  <link rel="manifest" href="/manifest.webmanifest" />

  <!-- Tailwind -->
  <script src="/newsprint-tailwind.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/newsprint.css" />

  <!-- Sanitizer + Markdown -->
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@13.0.3/marked.min.js"></script>

  <!-- Syntax highlight -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11.10.0/styles/github-dark.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11.10.0/highlight.min.js"></script>

  
</head>

<body class="min-h-[100svh] bg-newsprint-paper text-newsprint-ink antialiased newsprint-texture">
  <div class="mx-auto max-w-7xl px-3 sm:px-6 lg:px-8 py-4 sm:py-6">
    <div class="flex gap-4">
      <!-- Sidebar (desktop only; unchanged except nav links) -->
      <aside class="hidden md:flex md:w-72 shrink-0">
        <div
          class="stack-surface np-surface w-full h-full flex flex-col p-4">
          <div class="flex items-center justify-between">
            <h2 class="text-base font-semibold tracking-tight text-emerald-400">Saved Chats</h2>
            <button id="refreshSavedBtn" type="button"
              class="np-btn np-btn-secondary hard-shadow-hover px-2 py-1">
              Refresh
            </button>
          </div>
          <ul id="savedChats" class="mt-3 space-y-2 text-sm"></ul>
          <div class="flex-1"></div>

          <!-- Home + About links -->
          <nav class="mt-4 text-sm flex items-center gap-4">
            <a href="/" class="np-link">Home</a>
            <a href="/about.html" class="np-link">About</a>
          </nav>
        </div>
      </aside>

      <!-- Main column -->
      <main class="flex-1">
        <!-- CARD: grid rows (header / content). Mobile fills screen; desktop unchanged -->
        <div class="stack-surface np-surface overflow-visible
                    grid grid-rows-[auto,1fr] min-h-[calc(100svh-2rem)] md:min-h-0">
          <!-- Header -->
          <header
            class="sticky md:static top-0 z-30 px-4 sm:px-8 py-3 md:pt-6 md:pb-4 border-b border-slate-800/60
                   bg-slate-900/70 md:bg-transparent backdrop-blur supports-[backdrop-filter]:bg-slate-900/50 md:supports-[backdrop-filter]:bg-transparent">
            <div class="flex items-center justify-between gap-2">
              <h1 class="text-2xl sm:text-4xl md:text-4xl font-bold tracking-tight">
                Yummy Tummy <span class="text-emerald-400">AI</span>
              </h1>

              <!-- Mobile hamburger (desktop hidden) -->
              <button id="mobileMenuBtn" aria-controls="mobileSavedModal" aria-expanded="false" class="md:hidden np-btn np-btn-secondary hard-shadow-hover h-12 w-12 px-0"
                aria-label="Show saved chats">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                  stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8h16M4 16h16" />
                </svg>
              </button>
            </div>
          </header>

          <!-- CONTENT ROW (fills remaining height) -->
          <section class="relative flex flex-col min-h-0 md:h-[75vh]">
            <!-- Local-only storage notice -->
            <div id="privacyNotice" class="hidden mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
              <div
                class="stack-surface np-surface stack-compact mt-3 p-3 sm:p-4 flex items-start gap-3">
                <svg class="w-5 h-5 mt-0.5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M13 16h-1v-4h-1m1-4h.01M12 2a10 10 0 100 20 10 10 0 000-20z" />
                </svg>
                <div class="text-sm leading-6">
                  <strong class="font-semibold">Privacy:</strong>
                  Saved chats are stored <span class="font-semibold">locally on this device</span>.
                  Live chat context is held briefly in server memory to keep the conversation flowing.
                  Acknowledging this notice enables saving.
                  <button id="privacyLearnMore"
                    class="ml-1 underline decoration-emerald-300/60 hover:decoration-emerald-200">Learn more</button>
                </div>
                <button id="privacyDismiss"
                  class="ml-auto np-btn np-btn-danger hard-shadow-hover"
                  aria-label="Dismiss privacy notice">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                  </svg>
                </button>
              </div>
            </div>

            <!-- Messages (NOTE: removed scroll-smooth to avoid fight with JS pinning) -->
            <div id="chatbox"
              class="flex-1 min-h-0 overflow-y-auto px-3 md:px-5 lg:px-8 py-4 md:py-5 space-y-3 md:space-y-4">
            </div>

            <!-- Jump-to-latest (appears only when user scrolled up) -->
            <button id="jumpLatest" class="hidden md:hidden absolute right-4 bottom-24 np-btn np-btn-secondary hard-shadow-hover text-sm">
              Jump to latest ↓
            </button>

            <!-- Typing indicator -->
            <div id="typing" class="hidden px-3 md:px-8">
              <div
                class="inline-flex items-center gap-2 np-surface px-3 py-2 text-slate-300">
                <span>Chef is typing</span>
                <span class="inline-flex gap-1">
                  <span class="w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce [animation-delay:-0.2s]"></span>
                  <span class="w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce [animation-delay:-0.1s]"></span>
                  <span class="w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce"></span>
                </span>
              </div>
            </div>

            <!-- Attachments preview tray -->
            <div id="previewTray" class="px-3 md:px-8 hidden">
              <div class="flex gap-2 flex-wrap py-2"></div>
            </div>

            <!-- SR live region -->
            <div id="srLive" class="sr-only" aria-live="polite"></div>

            <!-- Composer -->
            <div class="stack-surface stack-compact composer-safe sticky bottom-0 px-3 md:px-8 pb-[calc(0.75rem+env(safe-area-inset-bottom))] md:pb-[calc(1rem+env(safe-area-inset-bottom))] pt-2 md:pt-3
                        bg-slate-900/70 md:bg-slate-900/40 backdrop-blur-xl border-t border-slate-800/60">
              <div class="flex flex-col md:flex-row md:items-end gap-2">
                <label for="input" class="sr-only">Your message</label>
                <textarea id="input" rows="1" enterkeyhint="send" inputmode="text" autocomplete="off"
                  autocapitalize="sentences" class="w-full md:flex-1 rounded-xl md:rounded-2xl border border-slate-700/70 bg-slate-900/70 md:bg-slate-900/60
                         px-3 md:px-4 py-3 text-[15px] md:text-[15px] text-slate-100 placeholder-slate-400
                         shadow-inner outline-none focus:border-emerald-400 focus:ring-2 focus:ring-emerald-400/30
                         transition resize-none leading-6 md:leading-7 min-h-[52px] md:min-h-[48px] max-h-56"
                  placeholder="Ask a recipe question..."></textarea>

                <div class="flex items-center justify-end gap-2 shrink-0">
                  <button id="saveBtn" type="button" class="h-12 w-12 md:h-11 md:w-11 np-btn np-btn-secondary hard-shadow-hover"
                    title="Save chat" aria-label="Save chat">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                      stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17 3H7a2 2 0 00-2 2v14a2 2 0 002 2h10a2 2 0 002-2V5a2 2 0 00-2-2z" />
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 3v4h10V3" />
                    </svg>
                  </button>


                  <button id="newChatBtn"
                    class="h-12 w-12 md:h-11 md:w-11 np-btn np-btn-secondary hard-shadow-hover"
                    title="New Chat" aria-label="New Chat">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24"
                      stroke="currentColor" stroke-width="2">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                    </svg>
                  </button>

                  <button id="sendBtn" type="button" class="np-btn np-btn-primary hard-shadow-hover px-4 md:px-5 h-12 md:h-11
                           disabled:opacity-50 disabled:cursor-not-allowed" title="Send"
                    aria-label="Send message" disabled>
                    <span class="hidden md:inline">Send</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                      stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M5 12l14-7-7 14-2-5-5-2z" />
                    </svg>
                  </button>
                </div>
              </div>
            </div>
          </section>
        </div>
      </main>
    </div>
  </div>

  <!-- Mobile Saved Chats Modal -->
  <div class="fixed inset-0 z-40 hidden bg-black/70 sm:bg-black/60" id="mobileSavedModalBg"></div>
  <div class="stack-drawer stack-compact np-surface fixed left-0 top-0 z-50 hidden h-[100dvh] w-[92vw] sm:w-[82vw] max-w-xs overflow-y-auto p-5"
    id="mobileSavedModal" role="dialog" aria-modal="true" aria-labelledby="mobileSavedHeading">
    <div class="mb-3 flex items-center justify-between">
      <h2 id="mobileSavedHeading" class="text-base font-semibold tracking-tight text-emerald-400">Saved Chats</h2>
      <button class="np-btn np-btn-secondary hard-shadow-hover w-10 h-10" aria-label="Close"
        id="mobileCloseBtn">✕</button>
    </div>
    <ul id="mobileSavedChats" class="space-y-2 text-sm"></ul>
    <hr class="my-4 border-slate-800">

    <!-- Home + About links (mobile) -->
    <div class="flex items-center gap-4">
      <a href="/" class="np-link">Home</a>
      <a href="/about.html" class="np-link">About</a>
    </div>
  </div>

  <!-- Your client app (unchanged) -->
  <script type="module" src="/js/chat/index.js"></script>

  <!-- Stick-to-bottom like ChatGPT/FB Messenger -->
  <script src="/stickToBottom.js"></script>


</body>

</html>
